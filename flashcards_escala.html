<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grados de Escala</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070f;--surf:#0f0f1c;--card:#111120;
  --acc:#d4a843;--acc-glow:rgba(212,168,67,.14);--acc-dim:rgba(212,168,67,.55);
  --txt:#f0ebe0;--txt-dim:rgba(240,235,224,.5);--txt-mute:rgba(240,235,224,.28);
  --ok:#52c76e;--ok-bg:rgba(82,199,110,.12);
  --err:#e05a5a;--err-bg:rgba(224,90,90,.12);
  --bdr:rgba(255,255,255,.07);--card-bdr:rgba(212,168,67,.18);
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'JetBrains Mono',monospace}
body{min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden;position:relative}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(180deg,transparent 0,transparent 37px,rgba(255,255,255,.022) 37px,rgba(255,255,255,.022) 38px);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 35%,rgba(0,0,0,.55) 100%);pointer-events:none;z-index:0}

.app{position:relative;z-index:1;width:100%;max-width:680px;padding:36px 20px 64px}

/* screens */
.screen{display:none}
.screen.active{display:block}

/* ظ¤ظ¤ SETTINGS ظ¤ظ¤ */
.logo{font-family:'Playfair Display',serif;font-size:2.6rem;font-weight:900;text-align:center;letter-spacing:-.02em;margin-bottom:4px}
.logo span{color:var(--acc);font-style:italic}
.tagline{text-align:center;color:var(--txt-dim);font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;margin-bottom:40px}

.sec{margin-bottom:26px}
.sec-label{font-size:.68rem;text-transform:uppercase;letter-spacing:.16em;color:var(--acc);margin-bottom:11px;display:flex;align-items:center;gap:8px}
.sec-label::after{content:'';flex:1;height:1px;background:var(--card-bdr)}

.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{background:var(--card);border:1px solid var(--bdr);border-radius:6px;padding:8px 13px;font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--txt-dim);cursor:pointer;transition:all .14s;user-select:none}
.chip:hover{border-color:var(--acc-dim);color:var(--txt)}
.chip.on{background:var(--acc-glow);border-color:var(--acc);color:var(--acc)}

.deg-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.deg-chip{background:var(--card);border:1px solid var(--bdr);border-radius:7px;padding:10px 4px;text-align:center;cursor:pointer;transition:all .14s;user-select:none}
.deg-chip:hover{border-color:var(--acc-dim)}
.deg-chip.on{background:var(--acc-glow);border-color:var(--acc)}
.deg-roman{display:block;font-size:1rem;font-weight:700;color:var(--txt);margin-bottom:2px}
.deg-chip.on .deg-roman{color:var(--acc)}
.deg-ord{font-size:.58rem;text-transform:uppercase;letter-spacing:.04em;color:var(--txt-mute)}
.deg-chip.on .deg-ord{color:var(--acc-dim)}

.cnt-row{display:flex;gap:8px}
.cnt-chip{flex:1;background:var(--card);border:1px solid var(--bdr);border-radius:6px;padding:12px;text-align:center;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:1.05rem;font-weight:700;color:var(--txt-dim);transition:all .14s;user-select:none}
.cnt-chip:hover{border-color:var(--acc-dim);color:var(--txt)}
.cnt-chip.on{background:var(--acc-glow);border-color:var(--acc);color:var(--acc)}

.start-btn{width:100%;margin-top:8px;background:var(--acc);color:#07070f;border:none;border-radius:8px;padding:15px;font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;letter-spacing:.02em;cursor:pointer;transition:all .15s}
.start-btn:hover{transform:translateY(-1px);box-shadow:0 8px 32px rgba(212,168,67,.32)}
.start-btn:active{transform:none}

/* ظ¤ظ¤ GAME ظ¤ظ¤ */
.game-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.exit-btn{background:none;border:1px solid var(--bdr);border-radius:5px;padding:6px 10px;color:var(--txt-dim);font-size:.72rem;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all .14s}
.exit-btn:hover{border-color:var(--txt-dim);color:var(--txt)}
.stat-row{display:flex;gap:14px;align-items:center;font-size:.78rem;color:var(--txt-dim)}
.sv{color:var(--txt);font-weight:700}

.prog-track{height:2px;background:var(--bdr);border-radius:1px;margin-bottom:26px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--acc-dim),var(--acc));border-radius:1px;transition:width .4s cubic-bezier(.4,0,.2,1)}

.card{background:var(--card);border:1px solid var(--card-bdr);border-radius:13px;padding:38px 30px;margin-bottom:18px;text-align:center;position:relative;overflow:hidden;min-height:156px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--acc-dim),transparent)}
.card-badge{font-size:.62rem;text-transform:uppercase;letter-spacing:.16em;margin-bottom:14px}
.card-q{font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:400;line-height:1.4;color:var(--txt)}
.card-q strong{font-weight:900;color:var(--acc)}
.card-q em{font-style:italic}

.ans-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.ans-btn{background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:17px 10px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:11px;transition:all .14s;position:relative}
.ans-btn:hover:not(:disabled){border-color:var(--acc-dim);background:var(--acc-glow);transform:translateY(-1px)}
.ans-btn:disabled{cursor:default;transform:none!important}
.ans-kbd{font-size:.62rem;color:var(--txt-mute);background:rgba(255,255,255,.05);border-radius:3px;padding:2px 5px;transition:color .14s}
.ans-note{font-family:'JetBrains Mono',monospace;font-size:1.35rem;font-weight:700;color:var(--txt)}
.ans-btn.correct{border-color:var(--ok);background:var(--ok-bg);box-shadow:0 0 18px rgba(82,199,110,.13)}
.ans-btn.correct .ans-note{color:var(--ok)}
.ans-btn.correct .ans-kbd{color:var(--ok);opacity:.4}
.ans-btn.wrong{border-color:var(--err);background:var(--err-bg)}
.ans-btn.wrong .ans-note{color:var(--err)}
.ans-btn.reveal{border-color:var(--ok);background:var(--ok-bg)}
.ans-btn.reveal .ans-note{color:var(--ok)}

.feedback{text-align:center;padding:10px;border-radius:6px;font-size:.82rem;margin-bottom:11px;opacity:0;transform:translateY(4px);transition:opacity .2s,transform .2s;min-height:36px;display:flex;align-items:center;justify-content:center}
.feedback.show{opacity:1;transform:none}
.feedback.ok{color:var(--ok)}
.feedback.err{color:var(--err)}

.next-btn{width:100%;background:transparent;border:1px solid var(--acc-dim);border-radius:8px;padding:13px;font-family:'Playfair Display',serif;font-size:.98rem;font-weight:700;color:var(--acc);cursor:pointer;opacity:0;pointer-events:none;transition:all .2s}
.next-btn.show{opacity:1;pointer-events:all}
.next-btn:hover{background:var(--acc-glow)}

/* ظ¤ظ¤ RESULTS ظ¤ظ¤ */
.res-wrap{text-align:center}
.res-title{font-family:'Playfair Display',serif;font-size:1.1rem;font-style:italic;color:var(--txt-dim);margin-bottom:6px}
.res-score{font-family:'Playfair Display',serif;font-size:5.5rem;font-weight:900;color:var(--acc);line-height:1;letter-spacing:-.03em;margin-bottom:4px}
.res-sub{font-size:.68rem;text-transform:uppercase;letter-spacing:.15em;color:var(--txt-mute);margin-bottom:34px}
.res-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:30px}
.res-stat{background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:18px 10px}
.res-val{font-size:1.9rem;font-weight:700;color:var(--txt);display:block}
.res-lbl{font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:var(--txt-mute);margin-top:4px}
.res-acts{display:flex;gap:10px}
.sec-btn{flex:1;background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:15px;font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700;color:var(--txt-dim);cursor:pointer;transition:all .14s}
.sec-btn:hover{border-color:var(--txt-dim);color:var(--txt)}
.res-acts .start-btn{flex:1;margin-top:0}

@keyframes cardIn{from{opacity:0;transform:translateY(7px) scale(.99)}to{opacity:1;transform:none}}
.card-in{animation:cardIn .22s ease}

@media(max-width:480px){
  .logo{font-size:1.9rem}
  .card-q{font-size:1.35rem}
  .ans-grid{grid-template-columns:1fr}
  .res-score{font-size:4rem}
  .deg-grid{grid-template-columns:repeat(4,1fr)}
}
</style>
</head>

      <div class="res-stat"><span class="res-val" id="rerr">0</span><div class="res-lbl">Incorrectas</div></div>

    </div>
    <div class="res-acts">
      <button class="sec-btn" onclick="goSettings()">ظ Configurar</button>
      <button class="start-btn" onclick="startGame()">Repetir ظْ</button>
    </div>
  </div>
</div>

</div><!-- app -->

const DEGREES=[

const COUNTS=[10,20,30,50];

// ظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـ
// STATE
// ظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـ
let ST={
  scales:['mayor'],
  degs:[1,2,3,4,5,6,7],
  count:20,
  qs:[],idx:0,ok:0,err:0,streak:0,maxStreak:0,answered:false
};

// ظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـ
// SETTINGS
// ظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـ
function initSettings(){
  // scale chips
  document.getElementById('scale-chips').innerHTML=
    Object.entries(SCALES).map(([id,s])=>
      `<div class="chip${ST.scales.includes(id)?' on':''}" onclick="toggleScale('${id}',this)">${s.name}</div>`
    ).join('');

  // degree chips
  document.getElementById('deg-chips').innerHTML=
    DEGREES.map(d=>
      `<div class="deg-chip${ST.degs.includes(d.num)?' on':''}" onclick="toggleDeg(${d.num},this)">
        <span class="deg-roman">${d.roman}</span>
        <div class="deg-ord">${d.ord}</div>
      </div>`
    ).join('');

  // count chips
  document.getElementById('cnt-row').innerHTML=
    COUNTS.map(c=>
      `<div class="cnt-chip${ST.count===c?' on':''}" onclick="selectCount(${c},this)">${c}</div>`
    ).join('');
}

function toggleScale(id,el){
  const i=ST.scales.indexOf(id);
  if(i>=0){if(ST.scales.length>1){ST.scales.splice(i,1);el.classList.remove('on');}}
  else{ST.scales.push(id);el.classList.add('on');}
}
function toggleDeg(num,el){
  const i=ST.degs.indexOf(num);
  if(i>=0){if(ST.degs.length>1){ST.degs.splice(i,1);el.classList.remove('on');}}
  else{ST.degs.push(num);ST.degs.sort((a,b)=>a-b);el.classList.add('on');}
}
function selectCount(c,el){
  ST.count=c;
  document.querySelectorAll('.cnt-chip').forEach(e=>e.classList.remove('on'));
  el.classList.add('on');
}

// ظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـ
// GAME
// ظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـ
function shuffle(a){
  const b=[...a];
  for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}
  return b;
}

function buildPool(){
  const pool=[];
  for(const sid of ST.scales){
    const s=SCALES[sid];
    for(const [tonic,notes] of Object.entries(s.keys)){
      for(const deg of ST.degs){
        pool.push({sid,sname:s.name,scol:s.col,tonic,notes,di:deg-1});
      }
    }
  }
  return pool;
}

function wrongOpts(correct,notes){
  const pool=new Set();
  for(const sid of ST.scales)
    for(const ns of Object.values(SCALES[sid].keys))
      ns.forEach(n=>pool.add(n));
  pool.delete(correct);
  // prefer notes from same scale first
  const sameScale=notes.filter(n=>n!==correct);
  const others=[...pool].filter(n=>!sameScale.includes(n));
  return shuffle([...shuffle(sameScale),...shuffle(others)]).slice(0,3);
}

function startGame(){
  ST.qs=shuffle(buildPool()).slice(0,Math.min(ST.count,buildPool().length));
  // rebuild to avoid stale closure
  ST.qs=shuffle(buildPool()).slice(0,ST.count);
  ST.idx=0;ST.ok=0;ST.err=0;ST.streak=0;ST.maxStreak=0;ST.answered=false;
  showScreen('game');
  renderCard();
}

function renderCard(){
  const q=ST.qs[ST.idx];
  if(!q){showResults();return;}
  ST.answered=false;

  // stats
  const pct=(ST.idx/ST.qs.length)*100;
  document.getElementById('prog').style.width=pct+'%';
  document.getElementById('qn').textContent=ST.idx+1;
  document.getElementById('qt').textContent=ST.qs.length;
  document.getElementById('sc').textContent=ST.ok;
  document.getElementById('ss').textContent=ST.streak;

  // badge + question
  const badge=document.getElementById('badge');
  badge.textContent=q.sname.toUpperCase();
  badge.style.color=q.scol;

  const deg=DEGREES[q.di];
  document.getElementById('cq').innerHTML=
    `┬┐Cu├ةl es la <strong>${deg.ord}</strong> de <em>${q.tonic}</em> ${q.sname.toLowerCase()}?`;

  // animate
  const card=document.getElementById('card');
  card.classList.remove('card-in');
  void card.offsetWidth;
  card.classList.add('card-in');

  // answers
  const correct=q.notes[q.di];
  const opts=shuffle([correct,...wrongOpts(correct,q.notes)]);
  document.getElementById('ans').innerHTML=opts.map((n,i)=>
    `<button class="ans-btn" data-note="${n}" onclick="checkAns('${n}','${correct}')">
      <span class="ans-kbd">${i+1}</span>
      <span class="ans-note">${n}</span>
    </button>`
  ).join('');

  // reset feedback
  const fb=document.getElementById('fb');
  fb.className='feedback';fb.innerHTML='';
  document.getElementById('nxt').className='next-btn';
}

function checkAns(sel,correct){
  if(ST.answered)return;
  ST.answered=true;
  const ok=sel===correct;
  if(ok){ST.ok++;ST.streak++;ST.maxStreak=Math.max(ST.maxStreak,ST.streak);}
  else{ST.err++;ST.streak=0;}
  document.getElementById('sc').textContent=ST.ok;
  document.getElementById('ss').textContent=ST.streak;

  document.querySelectorAll('.ans-btn').forEach(b=>{
    b.disabled=true;
    if(b.dataset.note===correct) b.classList.add(ok?'correct':'reveal');
    else if(b.dataset.note===sel&&!ok) b.classList.add('wrong');
  });

  const fb=document.getElementById('fb');
  if(ok){
    const msgs=['┬ةCorrecto!','┬ةExacto!','┬ةMuy bien!','┬ةPerfecto!'];
    fb.textContent=ST.streak>=3?`≡ا¤ح ┬ةRacha de ${ST.streak}!`:msgs[Math.floor(Math.random()*msgs.length)];
    fb.className='feedback ok show';
  } else {
    const q=ST.qs[ST.idx];
    const deg=DEGREES[q.di];
    fb.innerHTML=`La ${deg.ord} de <strong>${q.tonic}</strong> ${q.sname.toLowerCase()} es <strong>${correct}</strong>`;
    fb.className='feedback err show';
  }
  document.getElementById('nxt').className='next-btn show';
}

function nextCard(){ST.idx++;renderCard();}

function showResults(){
  const total=ST.ok+ST.err;
  const pct=total?Math.round(ST.ok/total*100):0;
  document.getElementById('rpct').textContent=pct+'%';
  document.getElementById('rok').textContent=ST.ok;
  document.getElementById('rerr').textContent=ST.err;
  document.getElementById('rstr').textContent=ST.maxStreak;
  showScreen('results');
}

function goSettings(){showScreen('settings');initSettings();}

// NAVIGATION + KEYBOARD
// ظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـ
function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
}

document.addEventListener('keydown',e=>{
  const active=document.querySelector('.screen.active');
  if(!active||active.id!=='screen-game')return;
  if(e.key==='Enter'&&ST.answered){nextCard();return;}
  if(!ST.answered){
    const i=parseInt(e.key)-1;
    const btns=document.querySelectorAll('.ans-btn');
    if(i>=0&&i<btns.length)btns[i].click();
  }
});

// ظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـ
// INIT
// ظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـظـ
